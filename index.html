<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ledger — Expense Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="page">

  <header class="header">
    <div class="brand">
      <div class="brand-mark">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="2" y="2"  width="14" height="2" rx="1" fill="white"/>
          <rect x="2" y="7"  width="10" height="2" rx="1" fill="white"/>
          <rect x="2" y="12" width="12" height="2" rx="1" fill="white"/>
        </svg>
      </div>
      <span class="brand-name">Ledger</span>
    </div>
    <div class="header-date" id="todayDate"></div>
  </header>

  <div class="summary">
    <div class="sum-card">
      <div class="sum-label">Total spent</div>
      <div class="sum-value green" id="statTotal">Rs. 0</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">This month</div>
      <div class="sum-value" id="statMonth">Rs. 0</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">Transactions</div>
      <div class="sum-value" id="statCount">0</div>
    </div>
  </div>

  <div class="layout">

    <div class="left">

      <div class="card">
        <div class="card-head">
          <span class="card-title">New entry</span>
        </div>
        <div class="card-body">

          <div class="field" id="f-desc">
            <label for="desc">Description</label>
            <input type="text" id="desc" placeholder="What did you spend on?" autocomplete="off" />
            <div class="err-txt">Please enter a description.</div>
          </div>

          <div class="field" id="f-cat">
            <label for="category">Category</label>
            <select id="category">
              <option value="">Select category</option>
              <option value="Food">Food &amp; Dining</option>
              <option value="Transport">Transport</option>
              <option value="Shopping">Shopping</option>
              <option value="Bills">Bills &amp; Utilities</option>
              <option value="Health">Health</option>
              <option value="Entertainment">Entertainment</option>
              <option value="Education">Education</option>
              <option value="Housing">Housing</option>
              <option value="Other">Other</option>
            </select>
            <div class="err-txt">Please select a category.</div>
          </div>

          <div class="field" id="f-amt">
            <label for="amount">Amount</label>
            <div class="pfx">
              <span>Rs.</span>
              <input type="number" id="amount" placeholder="0.00" min="0" step="0.01" />
            </div>
            <div class="err-txt">Please enter a valid amount.</div>
          </div>

          <button class="btn-add" id="addBtn">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
              <line x1="6.5" y1="1"   x2="6.5" y2="12"  stroke="white" stroke-width="1.8" stroke-linecap="round"/>
              <line x1="1"   y1="6.5" x2="12"  y2="6.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            Add Entry
          </button>

        </div>
      </div>

      <div class="card">
        <div class="card-head">
          <span class="card-title">By category</span>
        </div>
        <div class="card-body" id="breakdown">
          <div class="empty" style="padding: 12px 0;">
            <p>No data yet</p>
          </div>
        </div>
      </div>

    </div>

    <div class="card">
      <div class="card-head">
        <span class="card-title">Transactions</span>
        <div class="search-wrap">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input class="search-input" type="text" id="searchInput" placeholder="Search..." />
        </div>
      </div>
      <div class="card-body">
        <div class="tx-list" id="txList">
          <div class="empty">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="8" y1="13" x2="16" y2="13"/>
              <line x1="8" y1="17" x2="12" y2="17"/>
            </svg>
            <p>No transactions yet.<br>Add your first entry above.</p>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
